name: Build WA image

on:
  push:
    branches: [develop, main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push WA image
        run: |
          if [ "${{ github.ref_name }}" = "develop" ]; then
            TAG=acc
          else
            TAG=prod
          fi

          docker build -t ghcr.io/gielvangaal/cine.net/wa:$TAG ./WA
          docker push ghcr.io/gielvangaal/cine.net/wa:$TAG
