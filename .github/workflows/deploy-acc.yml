name: CI/CD ACC Pipeline

on:
  push:
    branches: [ develop, New-kind-of-github-workflow, FEAT/New-kind-of-github-workflow ]
jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push API
        run: |
          docker build -f API/Dockerfile -t ghcr.io/ivar418/cine.net/api:acc .
          docker push ghcr.io/ivar418/cine.net/api:acc

  build-wa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push WA
        run: |
          docker build -f WA/Dockerfile -t ghcr.io/ivar418/cine.net/wa:acc .
          docker push ghcr.io/ivar418/cine.net/wa:acc
  deploy:
    needs: [ build-api, build-wa ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH with Jumphost
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 << 'EOF'
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          
          cat >> ~/.ssh/config <<EOF
          Host jumphost
            HostName ${{ secrets.JUMPHOST_IP }}
            Port 834
            User ${{ secrets.JUMPHOST_USER }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
          Host target
            HostName ${{ secrets.VPS_IP }}
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/id_ed25519
            ProxyJump jumphost
            StrictHostKeyChecking no
          EOF
      - name: Deploy via Docker Compose
        run: |
          ssh target << 'ENDSSH'
          
            echo "${{ secrets.PACKAGE_READ_KEY }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
            # Write docker-compose.yml to server
            cat > docker-compose.yml <<'EOF'
            services:
              api:
                image: ghcr.io/ivar418/cine.net/api:acc
                container_name: acc-cinenet-api
                restart: always
                networks:
                  - proxy
                  - internal
                environment:
                  ASPNETCORE_ENVIRONMENT: Acceptance
                  ConnectionStrings__DefaultConnection: >
                    Server=db;
                    Port=3306;
                    Database=${DB_NAME};
                    User=${DB_USER};
                    Password=${DB_PASSWORD};
                  TMDB_API_KEY_READ_ONLY: ${TMDB_API_KEY_READ_ONLY}
                depends_on:
                  db:
                    condition: service_healthy
                labels:
                  - traefik.enable=true
                  - traefik.http.routers.acc-cinenet-api.rule=Host(`acc-cinenetapi.ivarvisser.nl`)
                  - traefik.http.routers.acc-cinenet-api.entrypoints=https-external
                  - traefik.http.routers.acc-cinenet-api.tls=true
                  - traefik.http.routers.acc-cinenet-api.tls.certresolver=letsencrypt
                  - traefik.http.services.acc-cinenet-api.loadbalancer.server.port=8080
                  - traefik.http.routers.acc-cinenet-api-http.rule=Host(`acc-cinenetapi.ivarvisser.nl`)
                  - traefik.http.routers.acc-cinenet-api-http.entrypoints=http-external
                  - traefik.http.routers.acc-cinenet-api-http.middlewares=redirect-to-https
                  - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
                  - traefik.docker.network=proxy
          
              wa:
                image: ghcr.io/ivar418/cine.net/wa:acc
                container_name: acc-cinenet-wa
                restart: always
                networks:
                  - proxy
                labels:
                  - traefik.enable=true
                  - traefik.http.routers.acc-cinenet-wa.rule=Host(`acc-cinenetwa.ivarvisser.nl`)
                  - traefik.http.routers.acc-cinenet-wa.entrypoints=https-external
                  - traefik.http.routers.acc-cinenet-wa.tls=true
                  - traefik.http.routers.acc-cinenet-wa.tls.certresolver=letsencrypt
                  - traefik.http.services.acc-cinenet-wa.loadbalancer.server.port=80
                  - traefik.http.routers.acc-cinenet-wa-http.rule=Host(`acc-cinenetwa.ivarvisser.nl`)
                  - traefik.http.routers.acc-cinenet-wa-http.entrypoints=http-external
                  - traefik.http.routers.acc-cinenet-wa-http.middlewares=redirect-to-https
          
              db:
                image: mysql:8.4
                container_name: acc-cinenet-db
                restart: always
                networks:
                  - internal
                environment:
                  MYSQL_DATABASE: ${DB_NAME}
                  MYSQL_USER: ${DB_USER}
                  MYSQL_PASSWORD: ${DB_PASSWORD}
                  MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                  interval: 5s
                  timeout: 5s
                  retries: 10
          
            networks:
              proxy:
                external: true
              internal:
            EOF
          
            # Write .env file
            cat > .env <<EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            TMDB_API_KEY_READ_ONLY=${{ secrets.TMDB_API_KEY_READ_ONLY }}
            EOF
          
            # Pull latest images
            docker compose pull
          
            # Recreate everything (fresh DB every deploy)
            docker compose down
            docker compose up -d --remove-orphans
          
            # Debug info
            docker ps | grep acc-cinenet
          
            echo "API logs:"
            docker logs --tail=20 acc-cinenet-api
          
          ENDSSH
      - name: Deployment complete
        run: |
          echo "✅ ACC Deployment successful!"
          echo "🔗 API: https://acc-cinenetapi.ivarvisser.nl"
          echo "🔗 Frontend: https://acc-cinenetwa.ivarvisser.nl"
