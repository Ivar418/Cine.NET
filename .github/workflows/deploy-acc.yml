name: Deploy API & Frontend ACC

on:
  push:
    branches: [ develop, New-kind-of-github-workflow, FEAT/New-kind-of-github-workflow ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH with Jumphost
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          cat >> ~/.ssh/config <<EOF
          Host jumphost
            HostName ${{ secrets.JUMPHOST_IP }}
            Port 834
            User ${{ secrets.JUMPHOST_USER }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no

          Host target
            HostName ${{ secrets.VPS_IP }}
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/id_ed25519
            ProxyJump jumphost
            StrictHostKeyChecking no
          EOF

      - name: Pull latest images from Github container registry
          run: |
            ssh target << 'ENDSSH'
            docker pull ghcr.io/ivar418/cine.net/api:acc
            docker pull ghcr.io/ivar418/cine.net/wa:acc

          # Stop and remove old containers

            docker stop acc-cinenet-api acc-cinenet-wa || true
            docker rm acc-cinenet-api acc-cinenet-wa || true

          # Run API backend with Traefik labels
            echo "Starting API backend..."
            docker run -d \
              --name acc-cinenet-api \
              --restart unless-stopped \
              --network proxy \
              -e ASPNETCORE_ENVIRONMENT=Acceptance \
              --label "traefik.enable=true" \
              --label "traefik.http.routers.acc-cinenet-api.rule=Host(\`acc-cinenetapi.ivarvisser.nl\`)" \
              --label "traefik.http.routers.acc-cinenet-api.entrypoints=websecure" \
              --label "traefik.http.routers.acc-cinenet-api.tls=true" \
              --label "traefik.http.routers.acc-cinenet-api.tls.certresolver=letsencrypt" \
              --label "traefik.http.services.acc-cinenet-api.loadbalancer.server.port=8080" \
              --label "traefik.http.routers.acc-cinenet-api-http.rule=Host(\`acc-cinenetapi.ivarvisser.nl\`)" \
              --label "traefik.http.routers.acc-cinenet-api-http.entrypoints=web" \
              --label "traefik.http.routers.acc-cinenet-api-http.middlewares=redirect-to-https" \
              --label "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https" \
              acc-cinenet-api:latest

            # Run frontend with Traefik labels
            echo "Starting frontend..."
            docker run -d \
              --name acc-cinenet-wa \
              --restart unless-stopped \
              --network proxy \
              --label "traefik.enable=true" \
              --label "traefik.http.routers.acc-cinenet-wa.rule=Host(\`acc-cinenetwa.ivarvisser.nl\`)" \
              --label "traefik.http.routers.acc-cinenet-wa.entrypoints=websecure" \
              --label "traefik.http.routers.acc-cinenet-wa.tls=true" \
              --label "traefik.http.routers.acc-cinenet-wa.tls.certresolver=letsencrypt" \
              --label "traefik.http.services.acc-cinenet-wa.loadbalancer.server.port=80" \
              --label "traefik.http.routers.acc-cinenet-wa-http.rule=Host(\`acc-cinenetwa.ivarvisser.nl\`)" \
              --label "traefik.http.routers.acc-cinenet-wa-http.entrypoints=web" \
              --label "traefik.http.routers.acc-cinenet-wa-http.middlewares=redirect-to-https" \
              acc-cinenet-wa:latest

            # Wait for containers to start
            echo "Waiting for services to start..."
            sleep 5

            # Check API health
            echo "Checking API health..."
            docker exec acc-cinenet-api curl --fail http://localhost:8080/health || echo "⚠️  Health check failed"

            # Show running containers
            echo "Running containers:"
            docker ps | grep acc-cinenet

            # Show recent logs
            echo "API logs:"
            docker logs --tail=20 acc-cinenet-api
            echo "Frontend logs:"
            docker logs --tail=20 acc-cinenet-wa
          ENDSSH

      - name: Deployment complete
        run: |
          echo "✅ ACC Deployment successful!"
          echo "🔗 API: https://acc-cinenetapi.ivarvisser.nl"
          echo "🔗 Frontend: https://acc-cinenetwa.ivarvisser.nl"