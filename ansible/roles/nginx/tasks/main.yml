- name: Check if TLS certificate exists
  stat:
    path: /etc/letsencrypt/live/{{ api_domain }}/fullchain.pem
  register: cert_file

- name: Fail if TLS certificate is missing
  fail:
    msg: "TLS certificate for {{ api_domain }} is missing. Provision certs before running nginx."
  when: not cert_file.stat.exists

- name: Place nginx config
  template:
    src: webapi.conf.j2
    dest: /etc/nginx/sites-available/webapi-{{ api_domain }}.conf

- name: Enable site
  file:
    src: /etc/nginx/sites-available/webapi-{{ api_domain }}.conf
    dest: /etc/nginx/sites-enabled/webapi-{{ api_domain }}.conf
    state: link
    force: true

- name: Validate nginx config
  command: nginx -t
  changed_when: false

- name: Reload nginx
  service:
    name: nginx
    state: reloaded