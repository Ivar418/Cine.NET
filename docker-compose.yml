# docker compose file for local dev

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: >
        Server=${DB_HOST};
        Port=${DB_PORT};
        Database=${DB_NAME};
        User=${DB_USER};
        Password=${DB_PASSWORD};
    depends_on:
      - db
    labels:
      - env=local
      - service=webapi

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ansible/roles/webapi/files/db-init/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    env_file:
      - .env
    environment:
      PMA_HOST: ${PHP_MYADMIN_HOST}
      PMA_USER: ${DB_ROOT_USER}
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
    depends_on:
      - db

volumes:
  mysql_data: