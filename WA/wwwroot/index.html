<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine.NET_WA</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script type="importmap"></script>
    <script>
        function downloadBase64Pdf(base64, fileName) {
            const link = document.createElement('a');
            link.href = 'data:application/pdf;base64,' + base64;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
    <script type="application/javascript" src="./js/languageStorage.js"></script>
</head>

<body>
<div id="app">
    <svg class="loading-progress">
        <circle r="40%" cx="50%" cy="50%" />
        <circle r="40%" cx="50%" cy="50%" />
    </svg>
    <div class="loading-progress-text"></div>
</div>

<div id="blazor-error-ui">
    An unhandled error has occurred.
    <a href="." class="reload">Reload</a>
    <span class="dismiss">🗙</span>
</div>

<!-- 1. Add autostart="false" -->
<script src="_framework/blazor.webassembly#[.{fingerprint}].js" autostart="false"></script>

<!-- 2. Manually start and force environment from header -->
<script>
    async function startBlazor() {
        try {
            // Fetch current page headers to see what Nginx sent
            const response = await fetch(window.location.href, { method: 'HEAD' });
            const env = response.headers.get('Blazor-Environment') || 'Production';

            console.log("Starting Blazor with forced environment:", env);

            Blazor.start({
                environment: env
            });
        } catch (e) {
            console.error("Failed to fetch environment header, falling back to Production", e);
            Blazor.start();
        }
    }

    startBlazor();
</script>
</body>

</html>
