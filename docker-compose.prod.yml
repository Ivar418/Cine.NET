services:
  api:
    image: ghcr.io/ivar418/cine.net/api:prod
    container_name: prod-cinenet-api
    restart: always
    networks:
      - proxy
      - internal

    env_file:
      - .env

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >
        Server=db;
        Port=3306;
        Database=${DB_NAME};
        User=${DB_USER};
        Password=${DB_PASSWORD};

    depends_on:
      db:
        condition: service_healthy

    labels:
      - traefik.enable=true
      - traefik.http.routers.prod-cinenet-api.rule=Host(`prod-cinenetapi.ivarvisser.nl`)
      - traefik.http.routers.prod-cinenet-api.entrypoints=https-external
      - traefik.http.routers.prod-cinenet-api.tls=true
      - traefik.http.routers.prod-cinenet-api.tls.certresolver=letsencrypt
      - traefik.http.services.prod-cinenet-api.loadbalancer.server.port=8080
      - traefik.http.routers.prod-cinenet-api-http.rule=Host(`prod-cinenetapi.ivarvisser.nl`)
      - traefik.http.routers.prod-cinenet-api-http.entrypoints=http-external
      - traefik.http.routers.prod-cinenet-api-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.docker.network=proxy

  wa:
    image: ghcr.io/ivar418/cine.net/wa:prod
    container_name: prod-cinenet-wa
    restart: always
    networks:
      - proxy

    labels:
      - traefik.enable=true
      - traefik.http.routers.prod-cinenet-wa.rule=Host(`prod-cinenetwa.ivarvisser.nl`)
      - traefik.http.routers.prod-cinenet-wa.entrypoints=https-external
      - traefik.http.routers.prod-cinenet-wa.tls=true
      - traefik.http.routers.prod-cinenet-wa.tls.certresolver=letsencrypt
      - traefik.http.services.prod-cinenet-wa.loadbalancer.server.port=80
      - traefik.http.routers.prod-cinenet-wa-http.rule=Host(`prod-cinenetwa.ivarvisser.nl`)
      - traefik.http.routers.prod-cinenet-wa-http.entrypoints=http-external
      - traefik.http.routers.prod-cinenet-wa-http.middlewares=redirect-to-https

  db:
    image: mysql:8.4
    container_name: prod-cinenet-db
    restart: always
    networks:
      - internal

    env_file:
      - .env

    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  proxy:
    external: true
  internal: